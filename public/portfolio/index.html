<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 - James Ying</title>
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
  <div class="nav-container">
    <a href="https://blog.taogame.com/" class="logo">
      此生余洁
      <span class="logo-slogan">余生有洁，此生无憾</span>
    </a>
    <button class="menu-toggle" id="menuToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="https://blog.taogame.com/" >首页</a></li>
      <li><a href="https://blog.taogame.com/blog/" >博客</a></li>
      <li><a href="https://blog.taogame.com/portfolio/" class="active">作品</a></li>
      <li><a href="https://blog.taogame.com/resume/" >简历</a></li>
    </ul>
  </div>
</nav>

  
  <main class="portfolio-page">
    <div class="container">
      <header class="page-header">
        <h1>作品集</h1>
        <p class="page-subtitle">精选项目，品质呈现</p>
      </header>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">全部</button>
        <button class="filter-btn" data-filter="web">Web应用</button>
        <button class="filter-btn" data-filter="mobile">移动应用</button>
        <button class="filter-btn" data-filter="component">组件库</button>
        <button class="filter-btn" data-filter="design">设计作品</button>
      </div>

      <div class="portfolio-grid" id="portfolioGrid">
        
      </div>

      <div class="modal" id="projectModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <button class="modal-close" id="modalClose">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="modal-body">
            <div class="modal-image">
              <div class="image-placeholder large">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </div>
            </div>
            <div class="modal-info">
              <span class="modal-category">Web应用</span>
              <h2>企业管理系统</h2>
              <p class="modal-description">一个功能完善的企业级SaaS管理平台，支持多租户架构、权限管理、数据可视化等功能。</p>
              <div class="modal-tech">
                <h4>技术栈</h4>
                <div class="tech-tags">
                  <span>Vue 3</span>
                  <span>TypeScript</span>
                  <span>Element Plus</span>
                  <span>Node.js</span>
                  <span>PostgreSQL</span>
                </div>
              </div>
              <div class="modal-links">
                <a href="#" class="btn-primary">在线演示</a>
                <a href="#" class="btn-outline">源代码</a>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
  <div class="container">
    <p>&copy; 2026 James Ying. All rights reserved.</p>
    <p class="footer-links">
      <a href="https://blog.taogame.com/">首页</a> · 
      <a href="https://blog.taogame.com/blog/">博客</a> · 
      <a href="https://blog.taogame.com/portfolio/">作品</a> · 
      <a href="https://blog.taogame.com/resume/">简历</a>
    </p>
  </div>
</footer>
  <script src="/js/custom.js"></script>
</body>
</html>
