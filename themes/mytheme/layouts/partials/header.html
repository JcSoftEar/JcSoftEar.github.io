<nav class="navbar">
  <div class="nav-container">
    <a href="{{ .Site.BaseURL }}" class="logo">
      {{ .Site.Title }}
      {{ with .Site.Params.slogan }}<span class="logo-slogan">{{ . }}</span>{{ end }}
    </a>
    <button class="menu-toggle" id="menuToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="{{ .Site.BaseURL }}" {{ if eq .RelPermalink "/" }}class="active"{{ end }}>首页</a></li>
      <li><a href="{{ .Site.BaseURL }}blog/" {{ if eq .RelPermalink "/blog/" }}class="active"{{ end }}>博客</a></li>
      <li><a href="{{ .Site.BaseURL }}portfolio/" {{ if in "/portfolio/" .RelPermalink }}class="active"{{ end }}>作品</a></li>
      <li><a href="{{ .Site.BaseURL }}resume/" {{ if in "/resume/" .RelPermalink }}class="active"{{ end }}>简历</a></li>
    </ul>
  </div>
</nav>
